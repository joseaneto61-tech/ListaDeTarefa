<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Cadastro</title>
</head>
<body>
     <h1>Bem Vindex!</h1>
    <h2>Criar Cadastro</h2>
    <form id="cadastroUsuario" type="submit">
        <label for="nomeCadastro">Nome</label>
        <input id="nomeCadastro" name="nomeCadastro" type="text">
        <label for="emailCadastro">Email</label>
        <input id="emailCadastro" name="emailCadastro" type="email">
        <label for="senhaCadastro">Senha</label>
        <input id="senhaCadastro" name="senhalCadastro" type="password">
        <input type="submit" value="Cadastro">
    </form>
    <script src="cadastro.js"></script>  
</body>
</html>
